# Managed by dotfiles — https://github.com/lamboley/dotfiles

Host *
    # --- Authentication: keys only, never offer every key ---
    PubkeyAuthentication yes
    PasswordAuthentication no
    PreferredAuthentications publickey
    IdentitiesOnly yes
    # Add a key to the agent on first use (prompts for the passphrase then, once)
    AddKeysToAgent yes

    # --- Host-key verification (anti-MITM) ---
    StrictHostKeyChecking ask
    HashKnownHosts yes
    VisualHostKey yes

    # --- Disable dangerous forwarding / delegation by default ---
    ForwardAgent no
    ForwardX11 no
    ForwardX11Trusted no
    GSSAPIAuthentication no
    PermitLocalCommand no
    Tunnel no

    # --- Strong cryptographic algorithms (AEAD + curve25519 + ETM MACs) ---
    KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
    Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
    MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com
    HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512,rsa-sha2-256,ecdsa-sha2-nistp256,ecdsa-sha2-nistp384

    # --- Session hygiene ---
    Compression no
    TCPKeepAlive no
    ServerAliveInterval 60
    ServerAliveCountMax 3
    ConnectTimeout 30
    RekeyLimit 512M 1h

    # --- Connection multiplexing (the socket dir ~/.ssh/cm must stay 0700) ---
    ControlMaster auto
    ControlPath ~/.ssh/cm/%C
    ControlPersist 10m
