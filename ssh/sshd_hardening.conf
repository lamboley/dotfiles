# Keys only — no passwords, no interactive auth.
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no
AuthenticationMethods publickey

# No root login.
PermitRootLogin no

# Limit brute force / hung sessions.
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# A bastion relays connections, nothing more.
X11Forwarding no
AllowAgentForwarding no
PermitTunnel no
# IMPORTANT: TCP forwarding must stay enabled — ProxyJump relies on it.
AllowTcpForwarding yes
# Optional: restrict which destinations the bastion may reach.
# PermitOpen 10.0.0.0/8:22

# Optional: lock down to your user only (uncomment and set).
# AllowUsers toi
